
services:
  fleetapi_sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleetapi_sqlserver_container
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    networks:
      - fleetapi-rede
    ports:
      - "1433:1433"

  fleetapi_redis:
    image: redis:latest
    container_name: fleetapi_redis_container
    networks:
      - fleetapi-rede
    ports:
      - "6379:6379"

  fleetapi_mongodb:
    image: mongo:latest
    container_name: fleetapi_mongodb_container
    environment:
      MONGO_INITDB_DATABASE: fleet_audit
    networks:
      - fleetapi-rede
    ports:
      - "27017:27017"

  fleetapi_rabbitmq:
    image: rabbitmq:3-management
    container_name: fleetapi_rabbitmq_container
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fleetapi-rede

networks:
  fleetapi-rede:
    driver: bridge
